server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/pmis_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    repair: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.example.pmis: DEBUG
    org.hibernate.SQL: DEBUG

jwt:
  secret: pmis-jwt-secret-key-2026-project-management-information-system
  expiration: 86400000
  issuer: pmis-app